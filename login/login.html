<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./login.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Normal TM:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="login-page">
     

      <main class="frame-parent">
        <div class="curita-parent">
          <h2 class="curita">curita</h2>
          <h2 class="shadowing">curita</h2>
        </div>

        <div class="frame-group">
          <section class="frame-wrapper">
            <form class="shadowing-parent">
              <h2 class="shadowing2">login</h2>

              <div class="shadowing-group">
                <h2 class="shadowing3">email</h2>
                <input class="frame-child" type="text" />
              </div>

              <div class="shadowing-container">
                <h2 class="shadowing4">password</h2>
                <input class="frame-child" type="password" />
              </div>
              <div class="frame-container">
                <button class="rectangle-parent" type="submit">
                  <div class="frame-inner"></div>
                  <span class="shadowing5">log in</span>
                </button>

                <div class="forgot-password-wrapper">
                  <a href="../forgot-password/forgot-password.html" class="forgot-password">
                     forgot password?
                   </a>
                </div>
              </div>
            </form>
          </section>

          <div class="ambulance-cute-3-parent">
           <img
    class="ambulance-cute-3"
    alt=""
    src="../ambulance cute 3.png"
  />

  <img
    class="face-mask-3"
    alt=""
    src="../face mask 3.png"
  />

  <img
    class="icon"
    loading="lazy"
    alt=""
    src="../3 5.png"
  />

        </div>
      </main>

     <footer class="footer">
  <div class="footer-block-parent">
    <div class="footer-block">
      <h1 class="footer-curita">curita</h1>
    </div>
    <h2 class="footer-found-for-you">found for you. every week.</h2>
  </div>
  <h2 class="footer-curita2">@2026 curita</h2>
</footer>
    </div>
    <script>
  const form = document.querySelector("form");
  const errorMessage = document.getElementById("errorMessage");

  const emailInput = document.querySelector('input[type="text"]');
  const passwordInput = document.querySelector('input[type="password"]');

  form.addEventListener("submit", function(event) {
    event.preventDefault();

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    errorMessage.style.display = "none";
    emailInput.style.border = "";
    passwordInput.style.border = "";

    if (email === "" || password === "") {
      errorMessage.textContent = "Please fill in all fields.";
      errorMessage.style.display = "block";

      emailInput.style.border = "2px solid red";
      passwordInput.style.border = "2px solid red";

      return;
    }

    if (email === "test@gmail.com" && password === "1234") {

      localStorage.setItem("loggedIn", "true");

      window.location.href = "../index.html";

    } else {

      errorMessage.textContent =
        "Incorrect email or password. Please try again.";

      errorMessage.style.display = "block";

      emailInput.style.border = "2px solid red";
      passwordInput.style.border = "2px solid red";
    }
  });
</script>
  </body>
</html>
