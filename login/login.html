<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./login.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Normal TM:wght@400&display=swap"
    />

  <body>
    <div class="login-page">
     

      <main class="frame-parent">
        <div class="curita-parent">
          <h2 class="curita">curita</h2>
          <h2 class="shadowing">curita</h2>
        </div>

        <div class="frame-group">
          <section class="frame-wrapper">
            <form class="shadowing-parent">
              <h2 class="shadowing2">login</h2>

              <div class="shadowing-group">
                <h2 class="shadowing3">email</h2>
                <input class="frame-child" type="text" />
              </div>

              <div class="shadowing-container">
                <h2 class="shadowing4">password</h2>
                <input class="frame-child" type="password" />
              </div>

              <div class="frame-container">
                <button class="rectangle-parent" type="submit">
                  <div class="frame-inner"></div>
                  <span class="shadowing5">log in</span>
                </button>

                <div class="forgot-password-wrapper">
                  <a href="#" class="forgot-password">forgot password?</a>
                </div>
              </div>
            </form>
          </section>

          <div class="ambulance-cute-3-parent">
            <img
              class="ambulance-cute-3"
              alt=""
              src="./public/ambulance-cute-3@2x.png"
            />

            <img class="face-mask-3" alt="" src="./public/face-mask-3@2x.png" />

            <img class="icon" loading="lazy" alt="" src="./public/3-5@2x.png" />
          </div>
        </div>
      </main>

     <footer class="footer">
  <div class="footer-block-parent">
    <div class="footer-block">
      <h1 class="footer-curita">curita</h1>
    </div>
    <h2 class="footer-found-for-you">found for you. every week.</h2>
  </div>
  <h2 class="footer-curita2">@2026 curita</h2>
</footer>
