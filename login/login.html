<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Normal TM:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="login-page">
      <img class="gradient-icon" alt="" src="./public/Gradient@2x.png" />

      <main class="frame-parent">
        <div class="curita-parent">
          <h2 class="curita">curita</h2>
          <h2 class="shadowing">curita</h2>
        </div>
        <div class="frame-group">
          <section class="frame-wrapper">
            <div class="shadowing-parent">
              <h2 class="shadowing2">login<br /></h2>
              <div class="shadowing-group">
                <h2 class="shadowing3">email</h2>
                <input class="frame-child" type="text" />
              </div>
              <div class="shadowing-container">
                <h2 class="shadowing4">password</h2>
                <input class="frame-child" type="text" />
              </div>
              <div class="frame-container">
                <button class="rectangle-parent">
                  <div class="frame-inner"></div>
                  <button class="shadowing5">log in</button>
                </button>
                <div class="forgot-password-wrapper">
                  <button class="forgot-password">forgot password?</button>
                </div>
              </div>
            </div>
          </section>
          <div class="ambulance-cute-3-parent">
            <img
              class="ambulance-cute-3"
              alt=""
              src="./public/ambulance-cute-3@2x.png"
            />

            <img class="face-mask-3" alt="" src="./public/face-mask-3@2x.png" />

            <img class="icon" loading="lazy" alt="" src="./public/3-5@2x.png" />
          </div>
        </div>
      </main>
      <footer class="frame-footer">
        <div class="frame-div">
          <div class="curita-wrapper">
            <h1 class="curita2">curita</h1>
          </div>
          <h2 class="found-for-you">found for you. every week.</h2>
        </div>
        <h2 class="curita3">@2026 curita</h2>
      </footer>
    </div>
  </body>
</html>
