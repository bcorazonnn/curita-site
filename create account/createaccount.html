  <body>
    <div class="create-account">
      <img
  class="gradient1png-icon"

  src="./gradient1.png"
/>

        <div class="curita-parent">
          <h2 class="curita">curita</h2>
          <h2 class="shadowing">curita</h2>
        </div>
      </div>
      <section class="create-account-child">
        <div class="frame-parent">

            <h2 class="shadowing2">create your account</h2>
          </div>
          <div class="frame-wrapper">
            <div class="shadowing-parent">
              <h2 class="shadowing3">email</h2>
            <input
  id="email"
  class="frame-child input-field"
  type="email"
  required
/>
            </div>
          </div>
          <div class="frame-wrapper">
  <div class="shadowing-parent">

   <input
  id="password"

/>

</div>
          <div class="frame-wrapper">

           <button class="rectangle-parent" type="button" onclick="createAccount()">
  <div class="rectangle-div"></div>

</button>
            <div class="shadowing-frame">
              <a href="../login/login.html" class="shadowing7">
  Already have an account? Log in

     <footer class="footer">

    </h2>

  <h2 class="footer-curita2">@2026 curita</h2>
</footer>

</div>

<!-- reveal animation script -->
<script>
const revealItems = document.querySelectorAll(".reveal");

const observer = new IntersectionObserver(
(entries)=>{
entries.forEach((entry)=>{
if(entry.isIntersecting){
entry.target.classList.add("active");
observer.unobserve(entry.target);
}
});
},
{
threshold:.06,
rootMargin:"0px 0px -6% 0px"
}
);

revealItems.forEach((item)=>
observer.observe(item)
);
</script>

<!-- create account script -->
<script>
const supabaseUrl =
"https://ffhtnfbeetngiaghmhrd.supabase.co";

const supabaseKey =
"sb_publishable_E0zupkyE3o7PovNtLXIj1A_30ZipeED";

const supabase =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function createAccount() {
  const email =
  document.getElementById("email").value.trim();

  const password =
  document.getElementById("password").value.trim();

  const confirmPassword =
  document.getElementById("confirmPassword").value.trim();

  const emailPattern =
  /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!email || !password || !confirmPassword) {
    alert("Complete all fields to create your Curita account.");
    return;
  }

  if (!emailPattern.test(email)) {
    alert("Invalid email address.");
    return;
  }

  if (password.length < 8) {
    alert("Password must be at least 8 characters.");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match.");
    return;
  }

  const { data, error } =
  await supabase.auth.signUp({
      email: email,
      password: password
  });

  if (error) {
      alert(error.message);
      return;
  }

  localStorage.setItem("loggedIn","true");

  alert("Account created successfully!");

  window.location.href="../signup/signup.html";
}
</script>

</body>
