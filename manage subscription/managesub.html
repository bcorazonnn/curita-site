<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./managesub.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Normal TM:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="subscription">
      <main class="gradient-parent">
         <img
    class="gradient1png-icon"
    alt=""
    src="../gradient1.png"
/>
        <h2 class="manage-your-plan">manage your plan and billing details</h2>
      </main>
      <main class="frame-parent">
        <section class="frame-wrapper">
          <div class="frame-group">
            <header class="frame-container">
              <div class="curita-logo-text-wrapper">
                <h2 class="curita-logo-text">curita</h2>
              </div>
              <h2 class="subscription-text">subscription</h2>
            </header>
            <div class="frame-div">
              <div class="current-plan-text-parent">
                <h2 class="current-plan-text">current plan</h2>
                <div class="curita-weekly-text-wrapper">
                  <h2 class="curita-weekly-text">curita weekly</h2>
                </div>
              </div>
            </div>
          </div>
        </section>
        <img class="icon" alt="" src="./public/4-1@2x.png" />
      </main>
      <div class="shadowing-wrapper">
        <h2 class="shadowing">$4.99 / month</h2>
      </div>
      <section class="frame-section">
        <div class="status-text-parent">
          <h2 class="status-text">status</h2>
          <h2 class="active-text">active</h2>
        </div>
        <div class="next-billing-date-text-parent">
          <h2 class="next-billing-date">next billing date</h2>
          <h2 class="active-text">may 17, 2026</h2>
        </div>
      </section>
      <div class="frame-parent2">
        <div class="frame-wrapper2">
          <div class="frame-parent3">
            <div class="frame-wrapper3">
              <button class="rectangle-parent">
                <div class="frame-child"></div>
                <h2 class="manage-billing-text">manage billing</h2>
              </button>
            </div>
            <h2 class="secure-billing-powered">
              secure billing powered by stripe
            </h2>
          </div>
        </div>
        <footer class="footer">
  <div class="footer-block-parent">
    <div class="footer-block">
      <h1 class="footer-curita">curita</h1>
    </div>
    <h2 class="footer-found-for-you">found for you. every week.</h2>
  </div>
  <h2 class="footer-curita2">@2026 curita</h2>
</footer>
      </div>
    </div>
  </body>
</html>
