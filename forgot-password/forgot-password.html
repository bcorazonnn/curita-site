<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Normal TM:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="forgot-password-page">
      <img class="gradient-icon" alt="" src="./public/Gradient@2x.png" />

      <main class="forgot-password-inner">
        <div class="frame-parent">
          <div class="curita-parent">
            <h2 class="curita">curita</h2>
            <h2 class="shadowing">curita</h2>
          </div>
          <section class="frame-wrapper">
            <div class="frame-group">
              <div class="shadowing-wrapper">
                <h2 class="shadowing2">recover your account</h2>
              </div>
              <div class="frame-container">
                <div class="frame-div">
                  <div class="shadowing-container">
                    <h2 class="shadowing3">email</h2>
                  </div>
                  <h2 class="enter-your-email">
                    enter your email and we’ll send you a reset link
                  </h2>
                </div>
                <input class="frame-child" type="text" />
              </div>
              <div class="frame-wrapper2">
                <button class="rectangle-parent">
                  <div class="frame-item"></div>
                  <button class="shadowing4">continue</button>
                </button>
              </div>
            </div>
          </section>
        </div>
      </main>
      <footer class="frame-footer">
        <div class="frame-parent2">
          <div class="curita-wrapper">
            <h1 class="curita2">curita</h1>
          </div>
          <h2 class="found-for-you">found for you. every week.</h2>
        </div>
        <h2 class="curita3">@2026 curita</h2>
      </footer>
    </div>
  </body>
</html>
