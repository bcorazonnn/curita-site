<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Normal TM:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="confirmation">
      <img class="gradient-icon" alt="" src="./public/Gradient@2x.png" />

      <div class="confirmation-inner">
        <div class="curita-parent">
          <h2 class="curita">curita</h2>
          <h2 class="shadowing">curita</h2>
        </div>
      </div>
      <main class="confirmation-child">
        <div class="frame-parent">
          <div class="shadowing-wrapper">
            <h2 class="shadowing2">check your email</h2>
          </div>
          <div class="shadowing-container">
            <div class="shadowing3">
              If an account exists, we’ve sent a password <br />reset link to
              your email.
            </div>
          </div>
          <section class="frame-wrapper">
            <div class="frame-group">
              <div class="frame-container">
                <div class="didnt-receive-it-check-spam-parent">
                  <h2 class="didnt-receive-it">
                    didn’t receive it? check spam or try again.
                  </h2>
                  <div class="frame-div">
                    <button class="rectangle-parent">
                      <div class="frame-child"></div>
                      <h2 class="shadowing4">resend</h2>
                    </button>
                  </div>
                </div>
              </div>
              <button class="back-to-login">back to login</button>
            </div>
          </section>
        </div>
      </main>
      <footer class="frame-footer">
        <div class="frame-parent2">
          <div class="curita-wrapper">
            <h1 class="curita2">curita</h1>
          </div>
          <h2 class="found-for-you">found for you. every week.</h2>
        </div>
        <h2 class="curita3">@2026 curita</h2>
      </footer>
    </div>
  </body>
</html>
